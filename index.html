<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>천타버스 지통실</title>
<style>
  :root {
    --bg: #070a14;
    --surface: #0d1120;
    --surface2: #131929;
    --border: #1e2740;
    --live: #ff3b3b;
    --live-glow: rgba(255,59,59,0.3);
    --accent: #7c6af7;
    --text: #e2e8f0;
    --muted: #64748b;
    --viewer: #34d399;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 50%, rgba(124,106,247,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative;
    z-index: 1;
    padding: 32px 24px 24px;
    text-align: center;
    background: linear-gradient(180deg, rgba(124,106,247,0.08) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #a78bfa, #7c6af7, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .subtitle { font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .live-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 18px;
    font-size: 13px;
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 6px var(--live-glow);
    animation: pulse 1.8s ease-in-out infinite;
  }
  .live-dot.none { background: var(--muted); box-shadow: none; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 16px;
    padding: 28px 20px;
    max-width: 1300px;
    margin: 0 auto;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    opacity: 0;
    animation: fadeIn 0.4s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(124,106,247,0.15);
  }
  .card.live {
    border-color: var(--live);
    box-shadow: 0 0 16px var(--live-glow);
  }
  .card.live:hover { box-shadow: 0 8px 32px var(--live-glow); border-color: #ff6060; }
  .card.offline .card-thumb { opacity: 0.4; }
  .card.offline .card-name { color: var(--muted); }
  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-thumb .placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; opacity: 0.3;
  }
  .badge-live {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--live);
    color: white;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(255,59,59,0.5);
  }
  .badge-viewer {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.75);
    color: var(--viewer);
    font-size: 11px; font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    backdrop-filter: blur(4px);
  }
  .card-info { padding: 12px 14px 14px; }
  .card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .card-title {
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.4;
  }
  .card-title.is-live { color: #94a3b8; }
  .loading {
    position: relative; z-index: 1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 16px;
    color: var(--muted);
    font-size: 11px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
</style>
</head>
<body>
<header>
  <div class="logo">CHUNTAVERSE</div>
  <div class="subtitle">천타버스 지통실</div>
  <div class="live-status">
    <span class="live-dot none" id="liveDot"></span>
    <span id="liveText">불러오는 중...</span>
  </div>
</header>
<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>방송 정보를 가져오는 중...</div>
  </div>
</div>
<footer id="footer"></footer>
<script>
function formatViewers(n) {
  if (!n || n <= 0) return null;
  if (n >= 10000) return (n / 10000).toFixed(1) + '만';
  return n.toLocaleString();
}

function buildCard(m, delay) {
  const tag = m.live ? 'a' : 'div';
  const card = document.createElement(tag);
  card.className = 'card ' + (m.live ? 'live' : 'offline');
  card.style.animationDelay = delay + 'ms';

  if (m.live) {
    card.href = 'https://play.sooplive.co.kr/' + m.id;
    card.target = '_blank';
    card.rel = 'noopener';
  }

  const viewers = formatViewers(m.viewers);
  const thumbHtml = m.thumb
    ? `<img src="${m.thumb}" alt="${m.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';

  card.innerHTML = `
    <div class="card-thumb">
      ${thumbHtml}
      <div class="placeholder" style="display:${m.thumb ? 'none' : 'flex'}">${m.emoji}</div>
      ${m.live ? '<span class="badge-live">LIVE</span>' : ''}
      ${viewers ? `<span class="badge-viewer">👁 ${viewers}</span>` : ''}
    </div>
    <div class="card-info">
      <div class="card-name">${m.name}</div>
      <div class="card-title ${m.live ? 'is-live' : ''}">${m.live ? (m.title || '방송 중') : '오프라인'}</div>
    </div>
  `;
  return card;
}

async function load() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    const data = await res.json();
    const members = [...data.members].sort((a, b) => (b.live ? 1 : 0) - (a.live ? 1 : 0));

    const grid = document.createElement('div');
    grid.className = 'grid';

    let liveCount = 0;
    members.forEach((m, i) => {
      grid.appendChild(buildCard(m, i * 40));
      if (m.live) liveCount++;
    });

    document.getElementById('app').innerHTML = '';
    document.getElementById('app').appendChild(grid);

    const dot = document.getElementById('liveDot');
    const text = document.getElementById('liveText');
    if (liveCount > 0) {
      dot.className = 'live-dot';
      text.textContent = liveCount + '명 방송 중';
    } else {
      dot.className = 'live-dot none';
      text.textContent = '현재 방송 중인 멤버 없음';
    }

    const updated = new Date(data.updated_at);
    document.getElementById('footer').textContent =
      '마지막 업데이트: ' + updated.toLocaleTimeString('ko-KR') + ' · 5분마다 자동 갱신';
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="loading"><div>데이터를 불러올 수 없어요</div></div>';
    console.error(e);
  }
}

load();
setInterval(load, 60 * 1000);
</script>
</body>
</html>
