<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>천타버스 드래프트</title>
<style>
  :root {
    --bg: #070a14;
    --surface: #0d1120;
    --surface2: #131929;
    --border: #1e2740;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e2e8f0;
    --muted: #64748b;
    --team1: #ff6b6b;
    --team2: #4ecdc4;
    --team3: #ffd93d;
    --team4: #95e1d3;
    --team5: #f38181;
    --team6: #aa96da;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 50%, rgba(124,106,247,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative;
    z-index: 1;
    padding: 28px 24px 20px;
    text-align: center;
    background: linear-gradient(180deg, rgba(124,106,247,0.08) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #a78bfa, #7c6af7, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .subtitle { font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .nav { position: absolute; top: 28px; left: 24px; }
  .nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 99px;
    background: var(--surface);
    transition: all 0.2s;
  }
  .nav a:hover { color: var(--accent2); border-color: var(--accent); }

  .controls {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 24px auto;
    padding: 18px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }
  .control-group { display: flex; align-items: center; gap: 10px; }
  .control-label { font-size: 13px; color: var(--muted); }
  .team-count-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
    min-width: 36px;
  }
  .team-count-btn:hover { border-color: var(--accent); }
  .team-count-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn {
    background: var(--accent);
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn:hover { background: #6b5ae8; transform: translateY(-1px); }
  .btn.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn.secondary:hover { border-color: var(--accent); background: var(--surface2); }

  .workspace {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }

  .pool {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .pool-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .pool-title { font-size: 14px; font-weight: 600; color: var(--muted); }
  .pool-count {
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 10px;
    border-radius: 99px;
  }

  .teams { display: grid; gap: 16px; }
  .teams[data-count="2"] { grid-template-columns: repeat(2, 1fr); }
  .teams[data-count="3"] { grid-template-columns: repeat(3, 1fr); }
  .teams[data-count="4"] { grid-template-columns: repeat(2, 1fr); }
  .teams[data-count="5"] { grid-template-columns: repeat(3, 1fr); }
  .teams[data-count="6"] { grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 900px) {
    .teams[data-count="3"], .teams[data-count="4"],
    .teams[data-count="5"], .teams[data-count="6"] {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (max-width: 600px) {
    .teams[data-count="2"], .teams[data-count="3"], .teams[data-count="4"],
    .teams[data-count="5"], .teams[data-count="6"] {
      grid-template-columns: 1fr;
    }
  }

  .team {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    min-height: 200px;
    transition: all 0.2s;
  }
  .team.drag-over {
    border-color: var(--accent);
    background: rgba(124,106,247,0.05);
  }
  .team-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--team-color);
  }
  .team-name { font-size: 15px; font-weight: 700; color: var(--team-color); }
  .team-count {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 99px;
  }

  .members {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 120px;
  }

  .member {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 14px 6px 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: grab;
    user-select: none;
    transition: all 0.2s;
    opacity: 0;
    animation: pop 0.3s ease forwards;
  }
  @keyframes pop {
    0% { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }
  .member:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 4px 12px rgba(124,106,247,0.2);
  }
  .member:active { cursor: grabbing; }
  .member.dragging { opacity: 0.4; }
  .member-emoji { font-size: 16px; }

  .empty-hint {
    width: 100%;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 30px 0;
    opacity: 0.5;
  }
</style>
</head>
<body>

<header>
  <div class="nav"><a href="index.html">← 지통실</a></div>
  <div class="logo">DRAFT</div>
  <div class="subtitle">천타버스 팀 드래프트</div>
</header>

<div class="controls">
  <div class="control-group">
    <span class="control-label">팀 수</span>
    <button class="team-count-btn" data-count="2">2</button>
    <button class="team-count-btn active" data-count="3">3</button>
    <button class="team-count-btn" data-count="4">4</button>
    <button class="team-count-btn" data-count="5">5</button>
    <button class="team-count-btn" data-count="6">6</button>
  </div>
  <div class="control-group">
    <button class="btn" id="shuffleBtn">🎲 랜덤 분배</button>
    <button class="btn secondary" id="resetBtn">초기화</button>
  </div>
</div>

<div class="workspace">
  <div class="pool">
    <div class="pool-header">
      <div class="pool-title">대기 명단</div>
      <div class="pool-count" id="poolCount">12/12</div>
    </div>
    <div class="members" id="pool"></div>
  </div>

  <div class="teams" id="teams" data-count="3"></div>
</div>

<script>
const MEMBERS = [
  { id: '243000',      name: '천양',   emoji: '🌙' },
  { id: 'madaomm',     name: '마다옴', emoji: '🌸' },
  { id: 'nanamoon777', name: '나나문', emoji: '🐰' },
  { id: 'imha22',      name: '임하밍', emoji: '🌿' },
  { id: 'doormomo',    name: '문모모', emoji: '🌷' },
  { id: 'kim91709',    name: '한아밍', emoji: '🌟' },
  { id: 'kappuchan',   name: '카푸',   emoji: '☁️' },
  { id: 'kyaang123',   name: '캬앙',   emoji: '🔥' },
  { id: 'wellro314',   name: '김웰로', emoji: '🎵' },
  { id: 'mocamu2',     name: '모카',   emoji: '☕' },
  { id: 'dalta20',     name: '달타',   emoji: '⚡' },
  { id: 'baeksoon2',   name: '파니',   emoji: '🦊' },
];

const TEAM_COLORS = [
  'var(--team1)', 'var(--team2)', 'var(--team3)',
  'var(--team4)', 'var(--team5)', 'var(--team6)'
];

let teamCount = 3;
let state = {
  poolIds: MEMBERS.map(m => m.id),
  teams: Array.from({ length: teamCount }, () => [])
};

function findMember(id) {
  return MEMBERS.find(m => m.id === id);
}

function render() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  if (state.poolIds.length === 0) {
    pool.innerHTML = '<div class="empty-hint">모두 팀에 배치됐습니다 ✨</div>';
  } else {
    state.poolIds.forEach(id => pool.appendChild(createMemberEl(id)));
  }
  document.getElementById('poolCount').textContent = `${state.poolIds.length}/12`;

  const teamsEl = document.getElementById('teams');
  teamsEl.setAttribute('data-count', teamCount);
  teamsEl.innerHTML = '';
  state.teams.forEach((memberIds, i) => {
    const team = document.createElement('div');
    team.className = 'team';
    team.dataset.teamIndex = i;
    team.style.setProperty('--team-color', TEAM_COLORS[i]);

    team.innerHTML = `
      <div class="team-header">
        <span class="team-name">팀 ${i + 1}</span>
        <span class="team-count">${memberIds.length}명</span>
      </div>
      <div class="members" data-team-index="${i}"></div>
    `;

    const memList = team.querySelector('.members');
    if (memberIds.length === 0) {
      memList.innerHTML = '<div class="empty-hint">여기로 드래그</div>';
    } else {
      memberIds.forEach(id => memList.appendChild(createMemberEl(id)));
    }

    setupDrop(team);
    teamsEl.appendChild(team);
  });

  setupDrop(document.querySelector('.pool'));
}

function createMemberEl(id) {
  const m = findMember(id);
  const el = document.createElement('div');
  el.className = 'member';
  el.draggable = true;
  el.dataset.memberId = id;
  el.innerHTML = `<span class="member-emoji">${m.emoji}</span><span>${m.name}</span>`;

  el.addEventListener('dragstart', (e) => {
    el.classList.add('dragging');
    e.dataTransfer.setData('text/plain', id);
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));

  return el;
}

function setupDrop(zone) {
  zone.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    zone.classList.add('drag-over');
  });
  zone.addEventListener('dragleave', (e) => {
    if (!zone.contains(e.relatedTarget)) {
      zone.classList.remove('drag-over');
    }
  });
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/plain');
    if (!id) return;
    moveMember(id, zone);
  });
}

function moveMember(id, targetZone) {
  state.poolIds = state.poolIds.filter(x => x !== id);
  state.teams = state.teams.map(t => t.filter(x => x !== id));

  if (targetZone.classList.contains('pool')) {
    state.poolIds.push(id);
  } else if (targetZone.classList.contains('team')) {
    const idx = parseInt(targetZone.dataset.teamIndex);
    state.teams[idx].push(id);
  }
  render();
}

document.querySelectorAll('.team-count-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const n = parseInt(btn.dataset.count);
    if (n === teamCount) return;

    document.querySelectorAll('.team-count-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const allTeamMembers = state.teams.flat();
    state.poolIds = [...state.poolIds, ...allTeamMembers];
    teamCount = n;
    state.teams = Array.from({ length: n }, () => []);
    render();
  });
});

document.getElementById('shuffleBtn').addEventListener('click', () => {
  const all = [...MEMBERS.map(m => m.id)];
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }

  state.poolIds = [];
  state.teams = Array.from({ length: teamCount }, () => []);

  all.forEach((id, i) => {
    state.teams[i % teamCount].push(id);
  });

  render();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  state.poolIds = MEMBERS.map(m => m.id);
  state.teams = Array.from({ length: teamCount }, () => []);
  render();
});

render();
</script>
</body>
</html>
