<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>천타버스 지통실</title>
<style>
  :root {
    --bg: #070a14;
    --surface: #0d1120;
    --surface2: #131929;
    --border: #1e2740;
    --live: #ff3b3b;
    --live-glow: rgba(255,59,59,0.3);
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e2e8f0;
    --muted: #64748b;
    --time: #fbbf24;
    --ev-start: #34d399;
    --ev-end: #f87171;
    --ev-title: #60a5fa;
    --ev-category: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 50%, rgba(124,106,247,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative;
    z-index: 1;
    padding: 32px 24px 20px;
    text-align: center;
    background: linear-gradient(180deg, rgba(124,106,247,0.08) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .nav-right {
    position: absolute;
    top: 28px;
    right: 24px;
  }
  .nav-right a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 99px;
    background: var(--surface);
    transition: all 0.2s;
  }
  .nav-right a:hover { color: var(--accent2); border-color: var(--accent); }
  .logo {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #a78bfa, #7c6af7, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .live-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 18px;
    font-size: 13px;
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 6px var(--live-glow);
    animation: pulse 1.8s ease-in-out infinite;
  }
  .live-dot.none { background: var(--muted); box-shadow: none; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
    padding: 24px 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 720px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    opacity: 0;
    animation: fadeIn 0.4s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(124,106,247,0.15);
  }
  .card.live { border-color: var(--live); box-shadow: 0 0 16px var(--live-glow); }
  .card.live:hover { box-shadow: 0 8px 32px var(--live-glow); border-color: #ff6060; }
  .card.offline .card-thumb { opacity: 0.4; }
  .card.offline .card-name { color: var(--muted); }
  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-thumb .placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; opacity: 0.3;
  }
  .badge-live {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--live);
    color: white;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(255,59,59,0.5);
  }
  .badge-time {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.75);
    color: var(--time);
    font-size: 11px; font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    backdrop-filter: blur(4px);
  }
  .card-info { padding: 12px 14px 14px; }
  .card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .card-title {
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.4;
  }
  .card-title.is-live { color: #94a3b8; }
  .loading {
    position: relative; z-index: 1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 16px;
    color: var(--muted);
    font-size: 11px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  /* 이벤트 타임라인 */
  .timeline-section {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px 24px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .timeline {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px;
    max-height: 280px;
    overflow-y: auto;
  }
  .timeline::-webkit-scrollbar { width: 6px; }
  .timeline::-webkit-scrollbar-track { background: transparent; }
  .timeline::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  .timeline-empty {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .event {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .event:hover { background: var(--surface2); }
  .event + .event { border-top: 1px solid var(--border); }
  .event-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .event-icon.start { background: rgba(52,211,153,0.15); color: var(--ev-start); }
  .event-icon.end { background: rgba(248,113,113,0.15); color: var(--ev-end); }
  .event-icon.title { background: rgba(96,165,250,0.15); color: var(--ev-title); }
  .event-icon.category { background: rgba(251,191,36,0.15); color: var(--ev-category); }

  .event-body {
    flex: 1;
    min-width: 0;
    font-size: 13px;
  }
  .event-member {
    font-weight: 700;
    margin-right: 4px;
  }
  .event-action {
    color: var(--muted);
  }
  .event-detail {
    color: #94a3b8;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }
  .event-time {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<header>
  <div class="nav-right"><a href="draft.html">드래프트 →</a></div>
  <div class="logo">CHUNTAVERSE</div>
  <div class="live-status">
    <span class="live-dot none" id="liveDot"></span>
    <span id="liveText">불러오는 중...</span>
  </div>
</header>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>방송 정보를 가져오는 중...</div>
  </div>
</div>

<div class="timeline-section">
  <div class="section-title">📋 최근 이벤트</div>
  <div class="timeline" id="timeline">
    <div class="timeline-empty">이벤트 불러오는 중...</div>
  </div>
</div>

<footer id="footer"></footer>

<script>
function formatBtime(seconds) {
  if (!seconds || seconds <= 0) return null;
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  if (h > 0) return h + '시간 ' + m + '분';
  return m + '분';
}

function formatRelTime(iso) {
  const now = new Date();
  const t = new Date(iso);
  const diff = Math.floor((now - t) / 1000);
  if (diff < 60) return '방금 전';
  if (diff < 3600) return Math.floor(diff / 60) + '분 전';
  if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
  return Math.floor(diff / 86400) + '일 전';
}

function buildCard(m, delay) {
  const tag = m.live ? 'a' : 'div';
  const card = document.createElement(tag);
  card.className = 'card ' + (m.live ? 'live' : 'offline');
  card.style.animationDelay = delay + 'ms';

  if (m.live) {
    card.href = 'https://play.sooplive.co.kr/' + m.id;
    card.target = '_blank';
    card.rel = 'noopener';
  }

  const btime = formatBtime(m.btime);
  const thumbHtml = m.thumb
    ? `<img src="${m.thumb}" alt="${m.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';

  card.innerHTML = `
    <div class="card-thumb">
      ${thumbHtml}
      <div class="placeholder" style="display:${m.thumb ? 'none' : 'flex'}">${m.emoji}</div>
      ${m.live ? '<span class="badge-live">LIVE</span>' : ''}
      ${btime ? `<span class="badge-time">⏱ ${btime}</span>` : ''}
    </div>
    <div class="card-info">
      <div class="card-name">${m.name}</div>
      <div class="card-title ${m.live ? 'is-live' : ''}">${m.live ? (m.title || '방송 중') : '오프라인'}</div>
    </div>
  `;
  return card;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function renderEvent(e) {
  const iconMap = { start: '▶', end: '■', title: '✏', category: '🏷' };
  const actionMap = {
    start: '방송 시작',
    end: '방송 종료',
    title: '방제 변경',
    category: '카테고리 변경',
  };

  let detail = '';
  if (e.type === 'start' && e.title) {
    detail = `<div class="event-detail">${escapeHtml(e.title)}</div>`;
  } else if (e.type === 'title') {
    detail = `<div class="event-detail">${escapeHtml(e.before)} → ${escapeHtml(e.after)}</div>`;
  } else if (e.type === 'category') {
    detail = `<div class="event-detail">${escapeHtml(e.before)} → ${escapeHtml(e.after)}</div>`;
  }

  return `
    <div class="event">
      <div class="event-icon ${e.type}">${iconMap[e.type] || '•'}</div>
      <div class="event-body">
        <div>
          <span class="event-member">${e.emoji} ${e.member_name}</span>
          <span class="event-action">${actionMap[e.type]}</span>
        </div>
        ${detail}
      </div>
      <div class="event-time">${formatRelTime(e.time)}</div>
    </div>
  `;
}

async function loadEvents() {
  try {
    const res = await fetch('events.json?t=' + Date.now());
    if (!res.ok) throw new Error('no events');
    const data = await res.json();
    const events = data.events || [];

    const tl = document.getElementById('timeline');
    if (events.length === 0) {
      tl.innerHTML = '<div class="timeline-empty">아직 기록된 이벤트가 없습니다</div>';
      return;
    }
    tl.innerHTML = events.slice(0, 30).map(renderEvent).join('');
  } catch (e) {
    document.getElementById('timeline').innerHTML =
      '<div class="timeline-empty">이벤트 데이터를 불러올 수 없어요</div>';
  }
}

async function load() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    const data = await res.json();
    const members = [...data.members].sort((a, b) => (b.live ? 1 : 0) - (a.live ? 1 : 0));

    const grid = document.createElement('div');
    grid.className = 'grid';

    let liveCount = 0;
    members.forEach((m, i) => {
      grid.appendChild(buildCard(m, i * 40));
      if (m.live) liveCount++;
    });

    document.getElementById('app').innerHTML = '';
    document.getElementById('app').appendChild(grid);

    const dot = document.getElementById('liveDot');
    const text = document.getElementById('liveText');
    if (liveCount > 0) {
      dot.className = 'live-dot';
      text.textContent = liveCount + '명 방송 중';
    } else {
      dot.className = 'live-dot none';
      text.textContent = '현재 방송 중인 멤버 없음';
    }

    const updated = new Date(data.updated_at);
    document.getElementById('footer').textContent =
      '마지막 업데이트: ' + updated.toLocaleTimeString('ko-KR') + ' · 5분마다 자동 갱신';
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="loading"><div>데이터를 불러올 수 없어요</div></div>';
    console.error(e);
  }
}

load();
loadEvents();
setInterval(() => { load(); loadEvents(); }, 60 * 1000);
</script>
</body>
</html>
