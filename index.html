<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>천타버스</title>
<link rel="icon" type="image/webp" href="Favicon.webp">
<style>
  :root {
    --bg: #070a14;
    --surface: #0d1120;
    --surface2: #131929;
    --border: #1e2740;
    --live: #ff3b3b;
    --live-glow: rgba(255,59,59,0.25);
    --accent: #61FFEC;
    --accent2: #61FFEC;
    --text: #e2e8f0;
    --muted: #64748b;
    --time: #fbbf24;
    --ev-start: #34d399;
    --ev-end: #f87171;
    --ev-title: #60a5fa;
    --ev-category: #fbbf24;
    --ev-post: #c084fc;
    --ev-youtube: #ef4444;
    --sidebar-w: 200px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 50%, rgba(97,255,236,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* 사이드바 */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    z-index: 2;
    flex-shrink: 0;
  }
  .sidebar-logo {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sidebar-logo img {
    max-width: 100%;
    max-height: 32px;
    height: auto;
    display: block;
  }
  .nav-list {
    padding: 8px 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 20px;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    border: none;
    background: none;
    text-align: left;
    width: 100%;
    font-family: inherit;
    border-left: 3px solid transparent;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
  }
  .nav-item:hover {
    color: var(--text);
    background: var(--surface2);
  }
  .nav-item.active {
    color: var(--accent2);
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .nav-icon { font-size: 16px; width: 18px; text-align: center; }

  /* 메인 영역 */
  .main {
    flex: 1;
    min-width: 0;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
  }
  .main-header {
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(97,255,236,0.05) 0%, transparent 100%);
    display: flex;
    align-items: center;
    gap: 16px;
    min-height: 56px;
  }
  .page-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .header-center {
    flex: 1;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .live-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 7px 16px;
    font-size: 13px;
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--live);
    box-shadow: 0 0 6px var(--live-glow);
    animation: pulse 1.8s ease-in-out infinite;
  }
  .live-dot.none { background: var(--muted); box-shadow: none; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .page { display: none; flex: 1; flex-direction: column; }
  .page.active { display: flex; }

  /* 그리드 4x3 */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 24px 32px;
    max-width: 1600px;
    width: 100%;
    margin: 0 auto;
    flex: 1;
  }
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    opacity: 0;
    animation: fadeIn 0.4s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 24px rgba(97,255,236,0.18);
  }
  .card.live { border-color: var(--accent); }
  .card.live:hover { border-color: var(--accent2); box-shadow: 0 8px 24px rgba(97,255,236,0.18); }
  .card.offline .card-thumb { opacity: 0.4; }
  .card.offline .card-name { color: var(--muted); }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-thumb .placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card-thumb .placeholder img {
    max-width: 60%;
    max-height: 80%;
    width: auto;
    height: auto;
    object-fit: contain;
    opacity: 0.4;
  }
  .badge-live {
    position: absolute;
    top: 10px; left: 10px;
    background: var(--live);
    color: white;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px;
    padding: 4px 10px;
    box-shadow: 0 2px 8px rgba(255,59,59,0.5);
  }
  .badge-time {
    position: absolute;
    bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.8);
    color: var(--time);
    font-size: 12px; font-weight: 600;
    padding: 4px 10px;
    backdrop-filter: blur(4px);
  }
  .card-info {
    padding: 12px 14px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-avatar {
    width: 36px;
    height: 36px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1.5px solid var(--border);
  }
  .card-text { min-width: 0; flex: 1; }
  .card-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .card-title {
    font-size: 12px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.3;
  }
  .card-title.is-live { color: #94a3b8; }

  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    flex: 1;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 이벤트 페이지 */
  .events-wrap {
    padding: 24px 32px;
    max-width: 1000px;
    width: 100%;
    margin: 0 auto;
    flex: 1;
  }
  .timeline {
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .timeline-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .event {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    transition: background 0.15s;
  }
  .event:hover { background: var(--surface2); }
  .event + .event { border-top: 1px solid var(--border); }
  .event-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    background: var(--surface2);
    font-weight: 700;
  }
  .event-icon.start { background: rgba(52,211,153,0.15); color: var(--ev-start); }
  .event-icon.end { background: rgba(248,113,113,0.15); color: var(--ev-end); }
  .event-icon.title { background: rgba(96,165,250,0.15); color: var(--ev-title); }
  .event-icon.category { background: rgba(251,191,36,0.15); color: var(--ev-category); }
  .event-icon.post { background: rgba(192,132,252,0.15); color: var(--ev-post); }
  .event-icon.youtube { background: rgba(239,68,68,0.15); color: var(--ev-youtube); }
  .event a.event-link { color: inherit; text-decoration: none; display: contents; }
  .event a.event-link:hover .event-detail { color: var(--accent2); }
  .event-avatar {
    width: 28px;
    height: 28px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .event-body { flex: 1; min-width: 0; font-size: 14px; }
  .event-member { font-weight: 700; margin-right: 6px; }
  .event-action { color: var(--muted); }
  .event-detail {
    color: #94a3b8;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 3px;
  }
  .event-time { font-size: 12px; color: var(--muted); flex-shrink: 0; }

  /* 모바일 */
  @media (max-width: 700px) {
    body { flex-direction: column; }
    .sidebar {
      width: 100%;
      height: auto;
      position: relative;
      flex-direction: row;
      padding: 8px;
      overflow-x: auto;
    }
    .sidebar-logo { display: none; }
    .nav-item {
      border-left: none;
      border-bottom: 3px solid transparent;
      padding: 10px 14px;
      white-space: nowrap;
    }
    .nav-item.active { border-left: none; border-bottom-color: var(--accent); }
    .main-header { padding: 16px 20px; min-height: 0; }
    .grid, .events-wrap { padding: 16px; }
    .page-title { font-size: 18px; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo"><img src="Title.webp" alt="CHUNTAVERSE"></div>
  <div class="nav-list">
    <button class="nav-item active" data-page="live">
      <span class="nav-icon">●</span>
      <span>생방송</span>
    </button>
    <button class="nav-item" data-page="events">
      <span class="nav-icon">▤</span>
      <span>최근 이벤트</span>
    </button>
  </div>
</aside>

<main class="main">
  <div class="main-header">
    <div class="page-title" id="pageTitle">생방송</div>
    <div class="header-center" id="headerCenter"></div>
    <div class="live-status" id="liveStatus">
      <span class="live-dot none" id="liveDot"></span>
      <span id="liveText">불러오는 중...</span>
    </div>
  </div>

  <!-- 지통실 -->
  <div class="page active" id="page-live">
    <div id="app">
      <div class="loading">
        <div class="spinner"></div>
        <div>방송 정보를 가져오는 중...</div>
      </div>
    </div>
  </div>

  <!-- 이벤트 -->
  <div class="page" id="page-events">
    <div class="events-wrap">
      <div class="timeline" id="timeline">
        <div class="timeline-empty">이벤트 불러오는 중...</div>
      </div>
    </div>
  </div>
</main>

<script>
const WORKER_URL = 'https://chuntaverse.crenop.workers.dev';

const MEMBERS = [
  { id: '243000',      name: '천양',   img: '01.webp' },
  { id: 'madaomm',     name: '마다옴', img: '02.webp' },
  { id: 'nanamoon777', name: '나나문', img: '03.webp' },
  { id: 'imha22',      name: '임하밍', img: '04.webp' },
  { id: 'doormomo',    name: '문모모', img: '05.webp' },
  { id: 'kim91709',    name: '한아밍', img: '06.webp' },
  { id: 'kappuchan',   name: '카푸',   img: '07.webp' },
  { id: 'kyaang123',   name: '캬앙',   img: '08.webp' },
  { id: 'wellro314',   name: '김웰로', img: '09.webp' },
  { id: 'mocamu2',     name: '모카',   img: '10.webp' },
  { id: 'dalta20',     name: '달타',   img: '11.webp' },
  { id: 'baeksoon2',   name: '파니',   img: '12.webp' },
];

function findMember(id) { return MEMBERS.find(m => m.id === id); }

// 페이지 전환
const PAGE_TITLES = { live: '생방송', events: '최근 이벤트' };
const VALID_PAGES = Object.keys(PAGE_TITLES);

let lastLiveUpdate = null;
let lastEventsUpdate = null;
let currentPage = 'live';

function updateHeaderCenter() {
  const el = document.getElementById('headerCenter');
  if (!el) return;
  if (currentPage === 'live') {
    el.textContent = lastLiveUpdate
      ? '30초마다 자동 갱신 · ' + lastLiveUpdate.toLocaleTimeString('ko-KR') + ' 기준'
      : '';
  } else if (currentPage === 'events') {
    el.textContent = lastEventsUpdate
      ? '1분마다 자동 감지 · ' + lastEventsUpdate.toLocaleTimeString('ko-KR') + ' 기준'
      : '';
  } else {
    el.textContent = '';
  }
}

function switchPage(page) {
  if (!VALID_PAGES.includes(page)) page = 'live';
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page];
  document.getElementById('liveStatus').style.visibility =
    page === 'live' ? 'visible' : 'hidden';
  updateHeaderCenter();
}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const page = btn.dataset.page;
    history.replaceState(null, '', '#' + page);
    switchPage(page);
  });
});

// 페이지 로드 시 URL 해시로 탭 복원
const initPage = (location.hash || '').replace('#', '') || 'live';
switchPage(initPage);

window.addEventListener('hashchange', () => {
  const p = (location.hash || '').replace('#', '') || 'live';
  switchPage(p);
});

function formatBtime(seconds) {
  if (!seconds || seconds <= 0) return null;
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  if (h > 0) return h + '시간 ' + m + '분';
  return m + '분';
}

function formatRelTime(iso) {
  const now = new Date();
  const t = new Date(iso);
  const diff = Math.floor((now - t) / 1000);
  if (diff < 60) return '방금 전';
  if (diff < 3600) return Math.floor(diff / 60) + '분 전';
  if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
  return Math.floor(diff / 86400) + '일 전';
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function soopProfileUrl(userId) {
  // SOOP 프로필 이미지: profile.img.sooplive.com/LOGO/{앞2글자}/{유저ID}/{유저ID}.jpg
  const prefix = userId.substring(0, 2);
  return `https://profile.img.sooplive.com/LOGO/${prefix}/${userId}/${userId}.jpg`;
}

function buildCard(m, info, delay) {
  const tag = info.live ? 'a' : 'div';
  const card = document.createElement(tag);
  card.className = 'card ' + (info.live ? 'live' : 'offline');
  card.style.animationDelay = delay + 'ms';

  if (info.live) {
    card.href = 'https://play.sooplive.co.kr/' + info.id;
    card.target = '_blank';
    card.rel = 'noopener';
  }

  const btime = formatBtime(info.btime);
  // 19금이면 썸네일 안 띄우고 placeholder만
  const thumbHtml = (info.thumb && !info.adult)
    ? `<img src="${info.thumb}" alt="${m.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';

  const profileUrl = soopProfileUrl(m.id);
  const avatarHtml = profileUrl
    ? `<img class="card-avatar" src="${profileUrl}" alt="${m.name}" onerror="this.onerror=null;this.src='${m.img}'">`
    : `<img class="card-avatar" src="${m.img}" alt="${m.name}">`;

  const titleText = info.live
    ? (info.title || '방송 중')
    : '오프라인';

  card.innerHTML = `
    <div class="card-thumb">
      ${thumbHtml}
      <div class="placeholder" style="display:${(info.thumb && !info.adult) ? 'none' : 'flex'}">
        <img src="${m.img}" alt="${m.name}">
      </div>
      ${btime ? `<span class="badge-time">⏱ ${btime}</span>` : ''}
    </div>
    <div class="card-info">
      ${avatarHtml}
      <div class="card-text">
        <div class="card-name">${m.name}</div>
        <div class="card-title ${info.live ? 'is-live' : ''}">${escapeHtml(titleText)}</div>
      </div>
    </div>
  `;
  return card;
}

function renderEvent(e) {
  const iconMap = { start: '▶', end: '■', title: '✎', category: '#', post: '글', youtube: '▶' };
  const actionMap = {
    start: '방송 시작',
    end: '방송 종료',
    title: '방제 변경',
    category: '카테고리 변경',
    post: '숲 게시글',
    youtube: '유튜브 영상',
  };

  const member = findMember(e.member_id);
  const avatarSrc = member ? member.img : '';

  let detail = '';
  if (e.type === 'start' && e.title) {
    detail = `<div class="event-detail">${escapeHtml(e.title)}</div>`;
  } else if (e.type === 'title' || e.type === 'category') {
    detail = `<div class="event-detail">${escapeHtml(e.before)} → ${escapeHtml(e.after)}</div>`;
  } else if ((e.type === 'post' || e.type === 'youtube') && e.title) {
    detail = `<div class="event-detail">${escapeHtml(e.title)}</div>`;
  }

  const inner = `
    <div class="event-icon ${e.type}">${iconMap[e.type] || '•'}</div>
    ${avatarSrc ? `<img class="event-avatar" src="${avatarSrc}" alt="${escapeHtml(e.member_name)}">` : ''}
    <div class="event-body">
      <div>
        <span class="event-member">${escapeHtml(e.member_name)}</span>
        <span class="event-action">${actionMap[e.type]}</span>
      </div>
      ${detail}
    </div>
    <div class="event-time">${formatRelTime(e.time)}</div>
  `;

  if (e.url) {
    return `<div class="event"><a class="event-link" href="${escapeHtml(e.url)}" target="_blank" rel="noopener">${inner}</a></div>`;
  }
  return `<div class="event">${inner}</div>`;
}

async function loadEvents() {
  try {
    const res = await fetch(WORKER_URL + '/events?t=' + Date.now());
    if (!res.ok) throw new Error('no events');
    const data = await res.json();
    const events = data.events || [];

    const tl = document.getElementById('timeline');
    if (events.length === 0) {
      tl.innerHTML = '<div class="timeline-empty">아직 기록된 이벤트가 없어요<br><br>방송, 게시글, 유튜브 영상 등이 올라오면 여기에 표시됩니다</div>';
    } else {
      tl.innerHTML = events.map(renderEvent).join('');
    }
    lastEventsUpdate = new Date();
    updateHeaderCenter();
  } catch (e) {
    document.getElementById('timeline').innerHTML =
      '<div class="timeline-empty">이벤트 데이터를 불러올 수 없어요</div>';
  }
}

async function loadLive() {
  try {
    const res = await fetch(WORKER_URL + '/?t=' + Date.now());
    const data = await res.json();

    const infoMap = {};
    data.members.forEach(m => { infoMap[m.id] = m; });

    const sorted = [...MEMBERS].sort((a, b) => {
      const al = (infoMap[a.id] && infoMap[a.id].live) ? 1 : 0;
      const bl = (infoMap[b.id] && infoMap[b.id].live) ? 1 : 0;
      return bl - al;
    });

    const grid = document.createElement('div');
    grid.className = 'grid';

    let liveCount = 0;
    sorted.forEach((m, i) => {
      const info = infoMap[m.id] || { id: m.id, live: false };
      grid.appendChild(buildCard(m, info, i * 35));
      if (info.live) liveCount++;
    });

    document.getElementById('app').innerHTML = '';
    document.getElementById('app').appendChild(grid);

    const dot = document.getElementById('liveDot');
    const text = document.getElementById('liveText');
    if (liveCount > 0) {
      dot.className = 'live-dot';
      text.textContent = liveCount + '명 방송 중';
    } else {
      dot.className = 'live-dot none';
      text.textContent = '방송 중인 멤버 없음';
    }

    const updated = new Date(data.updated_at);
    lastLiveUpdate = updated;
    updateHeaderCenter();
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="loading"><div>데이터를 불러올 수 없어요</div></div>';
    console.error(e);
  }
}

loadLive();
loadEvents();
// 라이브 카드는 30초마다, 이벤트는 20초마다, 상대시간은 30초마다 다시 그림
setInterval(loadLive, 30 * 1000);
setInterval(loadEvents, 20 * 1000);
</script>
</body>
</html>
